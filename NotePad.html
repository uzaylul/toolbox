<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NotePad</title>
  <style>
    :root {
      --bg-color: #000;
      --text-color: #e0e0e0;
      --accent-color: #944a32;   /* new accent */
      --error-color: #cf6679;
      --button-bg: #944a32;
      --button-hover-bg: var(--accent-color);
      --button-active-bg: #944a32;
      --input-bg: #1e1e1e;
      --input-border: #333;
    }

    * { box-sizing:border-box; }

    body{
      margin:0;
      font-family:'Segoe UI',Tahoma, Geneva,Verdana,sans-serif;
      background-color:var(--bg-color);
      color:var(--text-color);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:1rem;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    header{ text-align:center; margin-bottom:1.5rem; max-width:600px; width:100%; }
    header h1{margin:0;font-weight:700;font-size:2rem;}
    header p{margin:.3rem 0 0;color:#bbb;font-size:1rem;}

    main{
      width:100%;
      max-width:600px;
      background-color:var(--input-bg);
      padding:1rem 1.5rem;
      border-radius:8px;
      box-shadow:0 0 15px rgba(0,0,0,.5);
    }

    form{display:flex;flex-direction:column;gap:.5rem;}
    textarea{
      resize:vertical;
      min-height:80px;
      max-height:150px;
      background-color:var(--bg-color);
      border:1.5px solid var(--input-border);
      border-radius:6px;
      color:var(--text-color);
      font-size:1rem;
      padding:.5rem;
      transition:border-color .3s ease;
    }
    textarea:focus{outline:none;border-color:var(--accent-color);background:#1b1b1b;}

    .char-count{
      align-self:flex-end;
      font-size:.9rem;color:#999;
    }

    button{
      background-color:var(--button-bg);
      border:none;padding:.7rem;color:white;font-size:1rem;font-weight:600;border-radius:6px;cursor:pointer;
      transition:background-color .3s ease,transform .1s ease;
      user-select:none;
    }
    button:hover{background-color:var(--button-hover-bg);}
    button:active{background-color:var(--button-active-bg);transform:scale(.97);}

    .error-message{
      color:var(--error-color);
      font-size:.9rem;margin-top:-.2rem;margin-bottom:.5rem;
      min-height:1.2rem;user-select:none;
    }

    ul.notes-list{list-style:none;padding-left:0;margin-top:1rem;max-height:300px;overflow-y:auto;border-top:1px solid #333;}
    ul.notes-list li{
      display:flex;justify-content:space-between;align-items:center;
      padding:.6rem 0;border-bottom:1px solid #333;color:var(--text-color);word-break:break-word;
    }
    ul.notes-list li button.delete-btn{
      background:none;border:none;color:var(--error-color);cursor:pointer;font-weight:700;font-size:1rem;padding:0 .5rem;transition:color .3s ease;user-select:none;
    }
    ul.notes-list li button.delete-btn:hover{color:#ff4566;}

    ul.notes-list::-webkit-scrollbar{width:8px;}
    ul.notes-list::-webkit-scrollbar-thumb{
      background-color:var(--accent-color);
      border-radius:4px;
    }

    @media (max-width:480px){
      body{padding:.5rem;}
      header h1{font-size:1.5rem;}
      header p{font-size:.9rem;}
      main{padding:1rem;}
    }
  </style>
</head>
<body>

<header>
  <h1>Note Pad</h1>
  <p>Simple, functional notes in dark mode</p>
</header>

<main>
  <form id="noteForm" autocomplete="off" novalidate>
    <textarea
      id="noteInput"
      maxlength="300"
      placeholder="Write your note here… (max 300 chars)"
      aria-label="Note input"
      required></textarea>
    <div class="char-count" id="charCount">0 / 300</div>
    <div class="error-message" id="errorMsg"></div>
    <button type="submit">Add</button>
  </form>

  <ul class="notes-list" id="notesList" aria-live="polite" aria-label="Notes list">
    <!-- Notes will appear here -->
  </ul>
</main>

<script>
  const noteForm = document.getElementById('noteForm');
  const noteInput = document.getElementById('noteInput');
  const notesList = document.getElementById('notesList');
  const charCount = document.getElementById('charCount');
  const errorMsg = document.getElementById('errorMsg');

  const STORAGE_KEY = 'notes';
  let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

  function renderNotes() {
    notesList.innerHTML = '';
    if (!notes.length) {
      notesList.innerHTML = '<li style="color:#666;font-style:italic;">No notes yet.</li>';
      return;
    }
    notes.forEach((note, i) => {
      const li = document.createElement('li');
      li.textContent = note;

      const delBtn = document.createElement('button');
      delBtn.textContent = 'Delete';
      delBtn.className = 'delete-btn';
      delBtn.setAttribute('aria-label', `Delete note: ${note.slice(0,20)}${note.length>20?'...':''}`);
      delBtn.onclick = () => deleteNote(i);

      li.appendChild(delBtn);
      notesList.appendChild(li);
    });
  }

  function addNote(text){ notes.push(text); save(); renderNotes();}
  function deleteNote(idx){ notes.splice(idx,1); save(); renderNotes();}
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));}

  function updateCharCount() { charCount.textContent = `${noteInput.value.length} / 300`; }
  function showError(msg) { errorMsg.textContent = msg; }

  noteForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = noteInput.value.trim();
    if (!text){ showError('Cannot add empty note.'); return;}
    if (text.length>300){ showError('Note exceeds 300 characters.'); return;}
    addNote(text);
    noteInput.value=''; showError(''); updateCharCount(); noteInput.focus();
  });

  noteInput.addEventListener('input', () => {
    updateCharCount();
    if(errorMsg.textContent) showError('');
  });

  window.onload = () => { renderNotes(); updateCharCount();}
</script>

</body>
</html>
