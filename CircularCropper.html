<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Circular Cropper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1e1e1e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #f0f0f0;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: block;
            padding: 15px 30px;
            background: #944a32;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            transition: all 0.2s ease;
        }

        .upload-btn:hover {
            background: #7a3b26;
            transform: scale(1.02);
        }

        .upload-btn:active {
            transform: scale(0.98);
        }

        .preview-section {
            display: none;
            text-align: center;
            margin-bottom: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .canvas-wrapper {
            margin: 20px 0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 16px;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 50%;
            border: 3px solid #944a32;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: block;
        }

        .size-control {
            margin: 20px 0;
        }

        .size-control label {
            display: block;
            margin-bottom: 10px;
            color: #e0e0e0;
            font-weight: 600;
            font-size: 15px;
        }

        /* Cross-browser range styling (no webkit-specific errors) */
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #444;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #944a32;
            cursor: pointer;
            border: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #944a32;
            cursor: pointer;
            border: none;
        }

        input[type="range"]::-ms-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #944a32;
            cursor: pointer;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .download-btn {
            background: #4CAF50;
            color: white;
        }

        .download-btn:hover {
            background: #3e8e41;
        }

        .reset-btn {
            background: #f44336;
            color: white;
        }

        .reset-btn:hover {
            background: #c62828;
        }

        .info {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin-top: 20px;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Circular Cropper</h1>
        
        <div class="upload-section">
            <button type="button" class="upload-btn" id="uploadBtn">Select Image</button>
            <input type="file" id="imageInput" accept="image/jpeg, image/png, image/webp, image/bmp">
        </div>

        <div class="preview-section" id="previewSection">
            <div class="size-control">
                <label for="sizeSlider">Image Size: <span id="sizeValue">300</span> px</label>
                <input type="range" id="sizeSlider" min="100" max="500" value="300">
            </div>

            <div class="canvas-wrapper">
                <canvas id="canvas"></canvas>
            </div>

            <div class="buttons">
                <button class="download-btn" id="downloadBtn">Download</button>
                <button class="reset-btn" id="resetBtn">Reset</button>
            </div>

            <div class="info">
                Adjust size and download as PNG
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const uploadBtn = document.getElementById('uploadBtn');
            const imageInput = document.getElementById('imageInput');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const previewSection = document.getElementById('previewSection');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeValue = document.getElementById('sizeValue');
            const downloadBtn = document.getElementById('downloadBtn');
            const resetBtn = document.getElementById('resetBtn');

            let originalImage = null;
            let isDrawing = false;

            // Helper: draw circular image with proper context handling
            function drawCircularImage(size) {
                if (!originalImage || !originalImage.complete || originalImage.naturalWidth === 0) {
                    return;
                }

                // Set canvas dimensions (this automatically resets the context state)
                canvas.width = size;
                canvas.height = size;
                
                // Enable smooth image scaling
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                const radius = size / 2;
                const centerX = radius;
                const centerY = radius;

                // Save context state before clipping
                ctx.save();
                
                // Clear the entire canvas (optional but safe)
                ctx.clearRect(0, 0, size, size);
                
                // Create circular clipping path
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.clip();
                
                // Calculate scaling and positioning to cover the circle
                const scale = Math.max(size / originalImage.width, size / originalImage.height);
                const imgWidth = originalImage.width * scale;
                const imgHeight = originalImage.height * scale;
                const offsetX = (size - imgWidth) / 2;
                const offsetY = (size - imgHeight) / 2;
                
                // Draw image inside the clipped circle
                ctx.drawImage(originalImage, offsetX, offsetY, imgWidth, imgHeight);
                
                // Restore context to remove clipping (important for any future operations)
                ctx.restore();
                
                // Optional: draw a subtle border (already via CSS, but for consistency)
                // No extra actions needed
            }

            // Load image from file
            function loadImageFromFile(file) {
                if (!file) return;
                
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file.');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        originalImage = img;
                        previewSection.classList.add('active');
                        const currentSize = parseInt(sizeSlider.value, 10);
                        drawCircularImage(currentSize);
                    };
                    img.onerror = function() {
                        alert('Failed to load image. Please try another file.');
                        originalImage = null;
                        previewSection.classList.remove('active');
                    };
                    img.src = event.target.result;
                };
                reader.onerror = function() {
                    alert('Error reading file.');
                };
                reader.readAsDataURL(file);
            }

            // Event: upload button
            uploadBtn.addEventListener('click', function() {
                imageInput.click();
            });

            // Event: file selection
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    loadImageFromFile(file);
                }
            });

            // Event: size slider
            sizeSlider.addEventListener('input', function() {
                const newSize = parseInt(this.value, 10);
                sizeValue.textContent = newSize;
                if (originalImage) {
                    drawCircularImage(newSize);
                }
            });

            // Event: download button
            downloadBtn.addEventListener('click', function() {
                if (!originalImage) {
                    alert('No image loaded.');
                    return;
                }
                try {
                    // Ensure canvas has content
                    if (canvas.width === 0 || canvas.height === 0) return;
                    const link = document.createElement('a');
                    link.download = 'circular-image.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) {
                    alert('Unable to download image.');
                }
            });

            // Event: reset button
            resetBtn.addEventListener('click', function() {
                // Clear file input
                imageInput.value = '';
                originalImage = null;
                previewSection.classList.remove('active');
                // Reset slider to default
                sizeSlider.value = '300';
                sizeValue.textContent = '300';
                // Clear canvas
                canvas.width = 0;
                canvas.height = 0;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });

            // Optional: handle window resize or orientation change (maintain canvas if needed)
            // Not required, but keep functionality smooth
        })();
    </script>
</body>
</html>
