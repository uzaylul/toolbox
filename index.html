<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Toolbox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background-color: #000000;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, Roboto, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-main {
      flex: 1;
      position: relative;
      background: #000000;
      min-height: 0;
    }

    .iframe-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #0a0a0a;
      display: block;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #1f1f1f;
      border-top: 4px solid #944a32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .taskbar {
      background-color: #0a0a0a;
      border-top: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 20px;
      flex-wrap: wrap;
      backdrop-filter: blur(0px);
      z-index: 20;
      flex-shrink: 0;
      min-height: 68px;
    }

    .taskbar-btn {
      background-color: #944a32;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      color: white;
      font-size: 1.7rem;
      font-weight: 600;
      font-family: inherit;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      letter-spacing: 0;
      line-height: 1;
    }

    .taskbar-btn:hover {
      background-color: #b45a3f;
      transform: translateY(-3px);
    }

    .taskbar-btn:active {
      transform: translateY(1px);
      background-color: #7a3b28;
    }

    .taskbar-btn.active {
      background-color: #7a3b28;
      box-shadow: 0 0 0 2px #ffb08c, 0 0 0 4px #944a3240;
      transform: scale(0.98);
    }

    @media (max-width: 560px) {
      .taskbar-btn {
        width: 48px;
        height: 48px;
        font-size: 1.4rem;
        border-radius: 14px;
      }
      .taskbar {
        gap: 8px;
        padding: 6px 12px;
        min-height: 62px;
      }
    }

    .taskbar-btn:focus-visible {
      outline: 2px solid #ffaa88;
      outline-offset: 2px;
    }
  </style>
</head>
<body>

<div class="app-main">
  <div class="iframe-wrapper">
    <iframe id="toolFrame" title="tool viewer" src="about:blank"></iframe>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<div class="taskbar" id="taskbarContainer"></div>

<script>
  // --------------------------------------------------------------
  // TOOL LIST (all utility web apps)
  // Includes: Clock, Date, Countdown Timer, Timer, Circular Cropper,
  // Gradient Generator, Grid Generator, Note Pad, Palette Generator,
  // QR Generator, Banner Maker, Text Cleaner, Text Statistics.
  // (Multi Tile removed, Timer added)
  // --------------------------------------------------------------
  const tools = [
    { name: "Clock", file: "Clock.html" },
    { name: "Date", file: "date.html" },
    { name: "Countdown Timer", file: "CountdownTimer.html" },
    { name: "Timer", file: "Timer.html" },               // 🆕 Timer eklendi
    { name: "Circular Cropper", file: "CircularCropper.html" },
    { name: "Gradient Generator", file: "GradientGenerator.html" },
    { name: "Grid Generator", file: "GridGenerator.html" },
    // { name: "Multi Tile", file: "MultiTile.html" },    // ❌ Multi Tile kaldırıldı
    { name: "Note Pad", file: "NotePad.html" },
    { name: "Palette Generator", file: "PaletteGenerator.html" },
    { name: "QR Generator", file: "QRGenerator.html" },
    { name: "Banner Maker", file: "BannerMaker.html" },
    { name: "Text Cleaner", file: "TextCleaner.html" },
    { name: "Text Statistics", file: "TextStatistics.html" }
  ];

  // DOM elements
  const iframe = document.getElementById('toolFrame');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const taskbarContainer = document.getElementById('taskbarContainer');

  let currentActiveTool = null;
  let currentActiveButton = null;
  let loadTimeout = null;

  function showLoading() {
    if (loadingOverlay) {
      loadingOverlay.style.opacity = '1';
      loadingOverlay.style.visibility = 'visible';
      loadingOverlay.style.display = 'flex';
    }
  }

  function hideLoading() {
    if (loadingOverlay) {
      loadingOverlay.style.opacity = '0';
      setTimeout(() => {
        if (loadingOverlay.style.opacity === '0') {
          loadingOverlay.style.display = 'none';
        }
      }, 200);
    }
  }

  iframe.style.backgroundColor = '#000000';

  function loadTool(toolFile, buttonElement) {
    if (!toolFile) return;
    if (currentActiveTool === toolFile) return;

    if (currentActiveButton) {
      currentActiveButton.classList.remove('active');
    }
    if (buttonElement) {
      buttonElement.classList.add('active');
      currentActiveButton = buttonElement;
    }

    showLoading();
    loadingOverlay.style.display = 'flex';

    currentActiveTool = toolFile;
    iframe.src = toolFile;

    if (loadTimeout) clearTimeout(loadTimeout);
    loadTimeout = setTimeout(() => {
      if (loadingOverlay && loadingOverlay.style.display !== 'none') {
        hideLoading();
      }
    }, 2500);
  }

  iframe.addEventListener('load', () => {
    setTimeout(() => {
      hideLoading();
      if (loadTimeout) clearTimeout(loadTimeout);
    }, 80);
  });

  iframe.addEventListener('error', () => {
    hideLoading();
    if (loadTimeout) clearTimeout(loadTimeout);
    console.warn(`Failed to load: ${currentActiveTool}`);
  });

  function buildTaskbar() {
    taskbarContainer.innerHTML = '';
    tools.forEach((tool, idx) => {
      const fullName = tool.name;
      let initial = fullName.charAt(0).toUpperCase();
      
      const button = document.createElement('button');
      button.className = 'taskbar-btn';
      button.textContent = initial;
      button.title = fullName;
      button.dataset.file = tool.file;
      button.dataset.name = fullName;

      button.addEventListener('click', (e) => {
        e.preventDefault();
        loadTool(tool.file, button);
      });

      taskbarContainer.appendChild(button);

      if (idx === 0) {
        setTimeout(() => {
          if (!currentActiveTool) {
            loadTool(tool.file, button);
          }
        }, 30);
      }
    });
  }

  function init() {
    buildTaskbar();
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (iframe.src !== 'about:blank' && loadingOverlay.style.display !== 'none') {
          hideLoading();
        }
      }, 500);
    });
  }

  init();
</script>
</body>
</html>
