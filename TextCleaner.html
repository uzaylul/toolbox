<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>
<style>
  :root{
    --accent:#944a32;
  }
  body{
    margin:0;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding:20px;
    background:#000;          /* Dark background */
    color:#fff;               /* White text */
    transition:.3s ease;
  }
  h1{margin:0}
  .container{
    width:80%;
    max-width:600px;
    background:#111;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 4px rgba(255,255,255,.1);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  label{font-weight:bold;color:#bbb}
  textarea{
    width:100%;min-height:150px;padding:10px;
    border:1px solid #444;border-radius:4px;
    font-family:monospace;font-size:14px;background:#222;color:#eee;
    resize:both;box-sizing:border-box;
  }
  #result{
    width:100%;min-height:100px;padding:10px;
    background:#333;border:1px solid #555;border-radius:4px;
    font-family:monospace;font-size:14px;color:#eee;white-space:pre-wrap;
  }
  h2{font-weight:bold;margin-top:15px;color:#bbb}
  button{
    padding:10px 20px;background:var(--accent);color:#fff;border:none;
    border-radius:5px;cursor:pointer;font-size:16px;transition:.3s ease;
  }
  button:hover{background:#c06b27}
</style>
</head>

<body>
<h1>Text Cleaner</h1>

<div class="container">
  <label for="input">Paste text:</label>
  <textarea id="input"></textarea>
  <h2>Processed Text:</h2>
  <div id="result"></div>
</div>

<script>
const input = document.getElementById('input');
const result = document.getElementById('result');

input.addEventListener('input', () => {
  const cleaned = input.value.trim().replace(/\s+/g, ' ');
  result.textContent = cleaned;
});
</script>
</body>
</html>
